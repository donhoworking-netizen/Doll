<html>
<body>
	<table>
		<td>
			<canvas id="myCanvas" width="600" height="600"
			style="border: 2px solid black;"></canvas>
		</td>
		<td>
			<button id="upBtn">-^-</button>
			<button id="downBtn">-v-</button>
			<button id="leftBtn"><--</button>
			<button id="rightBtn">--></button>
		</td>
	</table>

	<script>
		//Supporting data and functions
		var dollX = 250;
		var dollY = 100;
		var curX = dollX;
		var curY = dollY;
		var foodX = 250;
		var foodY = 300;
		var foodAppear = true;
		var teleCount = 0;
		var step = 50;

		function redraw(){
			ctx.clearRect(0, 0, canvas.width, canvas.height);
			if (foodAppear == true){
				ctx.drawImage(foodImg, foodX, foodY, 36, 50);
			}
			else{
				ctx.drawImage(telImg, foodX - 32, foodY - 25, 100, 100);
			}
			ctx.drawImage(dollImg, curX, curY, 100, 100);
		}

		function smooth(){
			if (curX == dollX && curY == dollY){
				eat(2000);
			}
			else{
				
				if (curX < dollX){
					curX = curX + 1;
				}
				else if (curX > dollX){
					curX = curX - 1;
				}
				if (curY < dollY){
					curY = curY + 1;
				}
				else if (curY > dollY){
					curY = curY - 1;
				}
			}
			if (foodAppear == false){
				if (teleCount > 100){
					foodAppear = true;
					teleCount = 0;
				}
				else{
					teleCount = teleCount + 1;
				}
			}
		}

		function eat(range){
			if (Math.pow((dollX + 50) - (foodX + 18),2) +
			Math.pow((dollY + 50) - (foodY + 25),2) < range){
				if (foodAppear == true){
					foodAppear = false;
					teleport();
				}
			}
		}

		function teleport(){
			var rx = Math.floor((Math.random() * 600 + 200) - 400);
			var ry = Math.floor((Math.random() * 600 + 200) - 400);
			foodX = foodX + rx;
			foodY = foodY + ry;
			if (foodX > 550){
				foodX = 550;
			}
			else if (foodX < 50){
				foodX = 50;
			}
			if (foodY > 550){
				foodY = 550;
			}
			else if (foodY < 50){
				foodY = 50;
			}
			eat(10000);
		}

		//Game start from here!
		const canvas = document.getElementById('myCanvas');
		const ctx = canvas.getContext('2d');
		const dollImg = new Image();
		dollImg.src = 'fayfay.png';
		const foodImg = new Image();
		foodImg.src = 'siuyiu.png';
		const telImg = new Image();
		telImg.src = 'blackhole.png';
		setInterval(redraw, 1);
		setInterval(smooth, 1);

		//Control buttons
		upBtn.addEventListener('click', () => {
			dollY = dollY - step;
		});

		downBtn.addEventListener('click', () => {
			dollY = dollY + step;
		});

		leftBtn.addEventListener('click', () => {
			dollImg.src = 'fayfay.png';
			dollX = dollX - step;
		});

		rightBtn.addEventListener('click', () => {
			dollImg.src = 'fayfayR.png';
			dollX = dollX + step;
		});
	</script>
</body>
</html>
